<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduAI - AI Powered Learning Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div class="hero-badge">SDG 4 - Quality Education</div>
      <h1>EduAI</h1>
      <p class="subtitle">AI Powered Learning Assistant</p>
      <p class="hero-text">
        Ask questions, simplify topics, summarize notes, upload documents, and generate quizzes instantly.
      </p>
    </section>

    <section class="doc-card card">
      <div class="doc-header">
        <h2>Upload Document</h2>
        <span id="docStatus" class="status-text">No file</span>
      </div>
      <div class="doc-upload-area">
        <input type="file" id="fileInput" accept=".pdf,.docx,.xlsx,.pptx,image/*" hidden />
        <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
        <div class="upload-actions">
          <button id="browseBtn" class="secondary-btn" type="button">Choose File</button>
          <button id="captureBtn" class="secondary-btn" type="button">Capture Photo</button>
          <button id="uploadBtn" class="primary-btn" disabled>Upload</button>
        </div>
      </div>
      <div id="docInfo" class="doc-info hidden">
        <div class="doc-meta">
          <span id="docName"></span>
          <span id="docWords"></span>
          <span id="docPages"></span>
        </div>
      </div>
      <div id="docActions" class="doc-actions hidden">
        <button class="secondary-btn doc-action" data-action="summarize">Summarize</button>
        <button class="secondary-btn doc-action" data-action="quiz">Generate Quiz</button>
        <button class="secondary-btn doc-action" data-action="explain">Explain</button>
        <div class="doc-qa">
          <input type="text" id="questionInput" placeholder="Ask a question about the document..." />
          <button id="askBtn" class="primary-btn">Ask</button>
        </div>
      </div>
    </section>

    <section class="workspace">
      <div class="card input-card">
        <label for="userInput">Enter your topic or notes</label>
        <textarea id="userInput" placeholder="Type a topic, chapter, or notes here..."></textarea>
        <div class="button-row">
          <button id="askAiBtn" class="primary-btn">Ask AI</button>
          <button id="summarizeBtn" class="secondary-btn">Summarize Notes</button>
          <button id="quizBtn" class="secondary-btn">Generate Quiz</button>
        </div>
      </div>

      <div class="card output-card">
        <div class="card-header output-header">
          <h2>Output</h2>
          <div class="header-actions">
            <span id="statusText" class="status-text">Ready</span>
            <button id="copyBtn" class="copy-btn" type="button">Copy</button>
          </div>
        </div>
        <div id="output" class="output-box output">
          Your AI response will appear here.
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="events.js"></script>
</body>
</html>
