name = "eduin"
main = "worker.js"
compatibility_date = "2026-07-20"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "EduAIContainer"
image = "./Dockerfile"
max_instances = 1
instance_type = "basic"

[[durable_objects.bindings]]
name = "EDUAI_CONTAINER"
class_name = "EduAIContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EduAIContainer"]
